<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EventHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:
radial-gradient(circle at 10% 20%, rgba(79,70,229,0.35), transparent 40%),
radial-gradient(circle at 90% 80%, rgba(6,182,212,0.35), transparent 40%),
linear-gradient(135deg,#020617,#0f172a,#1e293b);

color:#e2e8f0;
min-height:100vh;

}

/* NAVBAR */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);

}

.logo{
font-size:22px;
font-weight:600;
color:white;
}

.nav-links a{

margin-left:30px;
text-decoration:none;
color:#cbd5f5;
font-weight:500;

}

.nav-links a:hover{
color:white;
}

.admin-btn{
background:linear-gradient(90deg,#4f46e5,#06b6d4);
padding:6px 14px;
border-radius:8px;
color:white;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px 80px;
}

.hero h1{
font-size:64px;
font-weight:700;
background:linear-gradient(90deg,#4f46e5,#06b6d4);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
font-size:20px;
margin-top:15px;
color:#94a3b8;
}

/* SECTION */

.section{
max-width:1000px;
margin:auto;
padding:60px 20px;
}

.section-title{
font-size:32px;
margin-bottom:30px;
text-align:center;
}

/* CATEGORY FILTER */

.category-filter{
text-align:center;
margin-bottom:30px;
}

.category-filter button{

margin:5px;
padding:8px 16px;

border:none;
border-radius:8px;

background:rgba(255,255,255,0.1);
color:white;

cursor:pointer;

}

.category-filter button:hover{

background:linear-gradient(90deg,#4f46e5,#06b6d4);

}

/* EVENT CARD */

.event{

background:rgba(255,255,255,0.08);

border-radius:16px;
padding:25px;

margin-bottom:20px;

}

.event h3{
margin-bottom:8px;
}

/* FORM */

.form{

margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;

}

input{

padding:10px;
border-radius:8px;
border:none;

background:rgba(255,255,255,0.1);
color:white;

}

button{

padding:10px 20px;
border:none;
border-radius:8px;

background:linear-gradient(90deg,#4f46e5,#06b6d4);
color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">EventHub</div>

<div class="nav-links">

<a href="#events">Events</a>
<a href="#features">Features</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
<a href="admin.html" class="admin-btn">Admin</a>

</div>

</div>

<div class="hero">

<h1>EventHub</h1>
<p>Discover and register for amazing tech events</p>

</div>

<div class="section" id="events">

<h2 class="section-title">Upcoming Events</h2>

<div class="category-filter">

<button onclick="filterEvents('All')">All</button>
<button onclick="filterEvents('AI')">AI</button>
<button onclick="filterEvents('Cloud')">Cloud</button>
<button onclick="filterEvents('DevOps')">DevOps</button>
<button onclick="filterEvents('Web')">Web</button>
<button onclick="filterEvents('Hackathon')">Hackathon</button>

</div>

<div id="events-list"></div>

</div>

<script src="script.js"></script>

</body>

</html>
